# miku-theme configuration
# Hexo theme featuring Hatsune Miku with deconstructivist + neo-futuristic design

# Navigation
nav:
  Home: /
  Archives: /archives/
  Tags: /tags/
  About: /about/
  Search: /search/

# Footer
copyright:
  since: 2026
  author: Blog Author

# Theme features
features:
  toc: true           # auto-generate table of contents on posts
  parallax: true      # parallax hero on homepage
  back_to_top: true   # back-to-top button
  search: true        # local search via hexo-generator-searchdb

# Hero section (homepage)
hero:
  title: "Miku's Blog"
  subtitle: "旋律化为文字之处"

# Post settings
post:
  date_format: "YYYY-MM-DD"
  reading_time: true

# Avatar (shown in about page and hero)
avatar: "/images/avatar.webp"

# Search
search:
  path: search.xml    # Generated by hexo-generator-searchdb
